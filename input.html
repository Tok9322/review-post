<script>
    // State variables
    let selectedMenu = '';
    let selectedMood = '';
    let uploadedPhotoUrl = '';

    // Simple UI Logic for Steps
    function showStep(stepNumber) {
        document.querySelectorAll('.step-container').forEach(el => el.classList.remove('active'));
        document.getElementById(`step-${stepNumber}`).classList.add('active');
        
        // Update dots
        document.querySelectorAll('.step-dot').forEach((el, index) => {
            if (index < stepNumber) {
                el.classList.remove('bg-surface-container-highest');
                el.classList.add('bg-primary');
            } else {
                el.classList.add('bg-surface-container-highest');
                el.classList.remove('bg-primary');
            }
        });
        window.scrollTo(0, 0);
    }

    function nextStep(step) {
        showStep(step);
    }

    function prevStep(step) {
        showStep(step);
    }

    // Toggle menu chips
    document.querySelectorAll('.menu-chip').forEach(chip => {
        chip.addEventListener('click', function() {
            document.querySelectorAll('.menu-chip').forEach(c => {
                c.classList.remove('border-primary', 'text-primary', 'bg-primary/10');
            });
            this.classList.add('border-primary', 'text-primary', 'bg-primary/10');
            selectedMenu = this.innerText.trim();
        });
    });

    // Toggle mood buttons
    document.querySelectorAll('.mood-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.mood-btn').forEach(b => {
                b.classList.remove('border-primary', 'bg-primary/5');
            });
            this.classList.add('border-primary', 'bg-primary/5');
            selectedMood = this.querySelector('span.text-5xl').innerText.trim();
        });
    });

    // Photo upload with compression to avoid sessionStorage quota limits
    function handlePhotoUpload(input) {
        if (input.files && input.files[0]) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                const imgObj = new Image();
                imgObj.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 1080;
                    let width = imgObj.width;
                    let height = imgObj.height;

                    if (width > height) {
                        if (width > MAX_SIZE) {
                            height *= MAX_SIZE / width;
                            width = MAX_SIZE;
                        }
                    } else {
                        if (height > MAX_SIZE) {
                            width *= MAX_SIZE / height;
                            height = MAX_SIZE;
                        }
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(imgObj, 0, 0, width, height);

                    const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.8);
                    
                    const imgPreview = document.getElementById('photo-preview');
                    imgPreview.src = compressedDataUrl;
                    imgPreview.classList.remove('hidden');
                    uploadedPhotoUrl = compressedDataUrl;
                };
                imgObj.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }
    }

    // Save and go to preview
    function submitForm() {
        const comment = document.getElementById('comment-input').value.trim();
        try {
            sessionStorage.setItem('reviewMenu', selectedMenu);
            sessionStorage.setItem('reviewMood', selectedMood);
            sessionStorage.setItem('reviewPhoto', uploadedPhotoUrl);
            sessionStorage.setItem('reviewComment', comment);
        } catch (e) {
            console.error('Storage error:', e);
            alert('写真のサイズが大きすぎるため、保存できませんでした。容量を減らしてもう一度お試しください。');
            return;
        }
        
        window.location.href = 'preview.html';
    }
</script>
