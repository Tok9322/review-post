<style>

        }

            font-family: 'Noto Serif JP', serif;
        }
        /* Disable text selection for app-like feel */
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;

            -webkit-tap-highlight-color: transparent;
        }

        .fade-up {
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;

<body class="bg-background text-on-background min-h-screen flex flex-col items-center overflow-x-hidden">

    <!-- Thank You Message -->
    <div class="fade-up delay-100 text-center space-y-4 mb-12">

        <p class="text-on-surface-variant font-medium leading-relaxed">

    <!-- Coupon Card -->
    <div class="fade-up delay-200 w-full bg-surface-container-high border border-primary/30 rounded-2xl p-1 relative overflow-hidden group shadow-lg mb-12">
        <!-- Shine effect -->
        <div class="absolute top-0 -inset-full h-full w-1/2 z-0 block transform -skew-x-12 bg-gradient-to-r from-transparent to-white opacity-10 group-hover:animate-[shine_1.5s]"></div>
        
        <div class="bg-surface-container border border-outline-variant/20 rounded-xl p-6 relative z-10 flex flex-col items-center text-center gap-4">

                <h3 class="text-2xl font-black text-primary-fixed-dim japanese-serif leading-tight">お好きなドリンク<br/>1杯サービス 🎁</h3>
            </div>
            
            <div class="w-full border-t border-dashed border-outline-variant/50 my-2"></div>
            
            <div class="space-y-1 w-full">
                <p class="text-xs text-on-surface-variant mb-2">お会計時にこの画面をご提示ください</p>
                <div class="bg-black/50 rounded-lg py-3 px-4 flex justify-between items-center w-full border border-outline-variant/30">
                    <span class="text-on-surface/50 text-sm font-medium">COUPON CODE</span>
                    <span class="font-mono text-xl font-bold tracking-widest text-primary-container">TANAKA-2026</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Action Buttons -->
    <div class="fade-up delay-300 w-full space-y-4 mt-auto">
        <button onclick="window.location.href='index.html'" class="w-full h-14 rounded-xl bg-surface-container-high border border-outline-variant/50 text-on-surface font-bold text-base hover:bg-surface-container-highest transition-all flex items-center justify-center gap-2">
            <span class="material-symbols-outlined">home</span>
            ホームに戻る
        </button>
        <button onclick="window.location.href='input.html'" class="w-full h-14 rounded-xl bg-gradient-to-br from-[#FFB86B] to-[#F19409] text-[#492900] font-bold text-base shadow-lg shadow-primary-container/20 hover:scale-[0.98] transition-transform flex items-center justify-center gap-2">
            <span class="material-symbols-outlined">add_photo_alternate</span>
            もう1枚つくる
        </button>
    </div>

</main>

<!-- Simple Confetti Effect -->
<script>
    function createConfetti() {
        const colors = ['#ffb86b', '#f19409', '#ffb4ab', '#b4a89e'];
        for (let i = 0; i < 50; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti rounded-sm absolute';
            
            // Random properties
            const color = colors[Math.floor(Math.random() * colors.length)];
            const left = Math.random() * 100;
            const delay = Math.random() * 0.5;
            const duration = Math.random() * 2 + 1;
            
            confetti.style.backgroundColor = color;
            confetti.style.left = `${left}%`;
            confetti.style.top = '-10px';
            
            // Animation
            confetti.animate([
                { transform: `translate3d(0,0,0) rotate(0)`, opacity: 1 },
                { transform: `translate3d(${Math.random()*100 - 50}px, 100vh, 0) rotate(${Math.random()*360}deg)`, opacity: 0 }
            ], {
                duration: duration * 1000,
                delay: delay * 1000,
                easing: 'cubic-bezier(.37,0,.63,1)',
                fill: 'forwards'
            });
            
            document.body.appendChild(confetti);
            
            // Cleanup
            setTimeout(() => {
                confetti.remove();
            }, (duration + delay) * 1000);
        }
    }

    // Run effect on load
    window.addEventListener('load', () => {
        setTimeout(createConfetti, 300);
    });
</script>

<style>
    @keyframes shine {
        100% { left: 125%; }
    }
</style>
